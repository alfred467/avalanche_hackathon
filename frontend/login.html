<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — Kelper</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="landing.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .auth-container {
      max-width: 400px;
      margin: 4rem auto;
      padding: 2.5rem;
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: 12px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.05);
    }
    .auth-title {
      font-family: var(--font-h);
      font-size: 1.8rem;
      text-align: center;
      margin-bottom: 0.5rem;
    }
    .auth-sub {
      text-align: center;
      color: var(--c-text-2);
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }
    .auth-form .field {
      display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1.25rem;
    }
    .auth-form label {
      font-size: 0.85rem; font-weight: 600; color: var(--c-text);
    }
    .auth-form input {
      width: 100%; padding: 0.75rem;
      border: 1px solid var(--c-border); border-radius: 6px;
      background: var(--c-bg); color: var(--c-text);
      font-family: var(--font-b);
    }
    .auth-form input:focus {
      outline: none; border-color: var(--c-green);
    }
    .auth-footer {
      text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--c-text-2);
    }
    .auth-footer a { color: var(--c-green); font-weight: 600; }
  </style>
</head>
<body style="background: var(--c-bg);">

  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-brand">
        <span class="nav-name">Kelper</span>
      </a>
      <div class="nav-actions">
        <a href="/signup" class="cta-btn-nav">Sign Up</a>
      </div>
    </div>
  </nav>

  <div class="auth-container">
    <h1 class="auth-title">Welcome Back</h1>
    <p class="auth-sub">Log in to manage your legal documents.</p>
    
    <form class="auth-form" id="login-form">
      <div class="field">
        <label for="email">Email Address</label>
        <input type="email" id="email" required placeholder="you@startup.co.ke">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn-primary-lg" style="width: 100%; margin-top: 1rem;">Log In</button>
    </form>
    
    <div class="auth-footer">
      Don't have an account? <a href="/signup">Sign up</a>
    </div>
  </div>

  <script>
    lucide.createIcons();
    const loginForm = document.getElementById('login-form');
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = loginForm.querySelector('button[type="submit"]');

      btn.disabled = true;
      btn.textContent = 'Authenticating...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        if (res.ok) {
          window.location.href = '/dashboard';
        } else {
          const data = await res.json();
          alert(data.error || 'Login failed. Please check your credentials.');
          btn.disabled = false;
          btn.textContent = 'Log In';
        }
      } catch (err) {
        alert('Connection error. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Log In';
      }
    });
  </script>
</body>
</html>
