<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Hack Cohort 1</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Courier New", monospace;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    h1 {
      font-size: 1.5rem;
      color: #e84142;
      margin-bottom: 0.5rem;
      letter-spacing: 0.05em;
    }

    p.subtitle {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 2rem;
    }

    .card {
      background: #111;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 2rem;
      width: 100%;
      max-width: 480px;
    }

    .status {
      font-size: 0.8rem;
      color: #666;
      margin-bottom: 1.5rem;
      padding: 0.75rem;
      background: #0d0d0d;
      border-radius: 4px;
      border-left: 3px solid #e84142;
    }

    .status.connected {
      border-left-color: #22c55e;
      color: #22c55e;
    }

    button {
      width: 100%;
      padding: 0.85rem;
      background: #e84142;
      color: white;
      border: none;
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.9rem;
      cursor: pointer;
      margin-bottom: 1rem;
      transition: background 0.15s;
    }

    button:hover { background: #c73535; }
    button:disabled { background: #333; color: #666; cursor: not-allowed; }

    .data-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid #1a1a1a;
      color: #999;
    }

    .data-row span:last-child { color: #e0e0e0; word-break: break-all; text-align: right; max-width: 60%; }

    #log {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: #444;
      max-height: 120px;
      overflow-y: auto;
    }

    #log p { padding: 0.2rem 0; }
    #log p.success { color: #22c55e; }
    #log p.error { color: #e84142; }
  </style>
</head>
<body>

  <h1>Mini Hack Cohort 1</h1>
  <p class="subtitle">Payments on Avalanche — Fuji Testnet</p>

  <div class="card">
    <div class="status" id="status">Not connected</div>

    <button id="connectBtn">Connect Core Wallet</button>
    <button id="balanceBtn" disabled>Get Balance</button>

    <div id="walletData" style="display:none;">
      <div class="data-row">
        <span>Address</span>
        <span id="address">--</span>
      </div>
      <div class="data-row">
        <span>Network</span>
        <span id="network">--</span>
      </div>
      <div class="data-row">
        <span>Balance</span>
        <span id="balance">--</span>
      </div>
    </div>

    <div id="log"></div>
  </div>

  <script>
    // Replace this with your deployed contract address after Week 2
    const CONTRACT_ADDRESS = "";

    const statusEl = document.getElementById("status");
    const connectBtn = document.getElementById("connectBtn");
    const balanceBtn = document.getElementById("balanceBtn");
    const walletData = document.getElementById("walletData");
    const addressEl = document.getElementById("address");
    const networkEl = document.getElementById("network");
    const balanceEl = document.getElementById("balance");
    const logEl = document.getElementById("log");

    let provider = null;
    let signer = null;

    function log(message, type = "info") {
      const p = document.createElement("p");
      p.textContent = `> ${message}`;
      if (type === "success") p.classList.add("success");
      if (type === "error") p.classList.add("error");
      logEl.prepend(p);
    }

    // Core Wallet injects window.ethereum, same as MetaMask
    // If you want to specifically detect Core Wallet, check window.avalanche
    function getProvider() {
      if (window.avalanche) {
        log("Core Wallet detected");
        return window.avalanche;
      }
      if (window.ethereum) {
        log("Injected provider detected (MetaMask or Core Wallet)");
        return window.ethereum;
      }
      return null;
    }

    connectBtn.addEventListener("click", async () => {
      const rawProvider = getProvider();

      if (!rawProvider) {
        log("No wallet detected. Install Core Wallet from core.app", "error");
        return;
      }

      try {
        // Request account access
        const accounts = await rawProvider.request({ method: "eth_requestAccounts" });
        const account = accounts[0];

        // Get chain ID
        const chainId = await rawProvider.request({ method: "eth_chainId" });
        const chainIdDecimal = parseInt(chainId, 16);

        if (chainIdDecimal !== 43113) {
          log("Wrong network. Switch to Avalanche Fuji Testnet (Chain ID 43113)", "error");
          return;
        }

        addressEl.textContent = account;
        networkEl.textContent = `Fuji Testnet (${chainIdDecimal})`;
        walletData.style.display = "block";

        statusEl.textContent = "Connected to Core Wallet";
        statusEl.classList.add("connected");

        connectBtn.disabled = true;
        balanceBtn.disabled = false;

        // Store for later use
        provider = rawProvider;

        log(`Connected: ${account.slice(0, 6)}...${account.slice(-4)}`, "success");

      } catch (err) {
        log(`Connection failed: ${err.message}`, "error");
      }
    });

    balanceBtn.addEventListener("click", async () => {
      try {
        const accounts = await provider.request({ method: "eth_accounts" });
        const account = accounts[0];

        const balanceHex = await provider.request({
          method: "eth_getBalance",
          params: [account, "latest"],
        });

        // Convert from wei (hex) to AVAX
        const balanceWei = BigInt(balanceHex);
        const balanceAVAX = Number(balanceWei) / 1e18;

        balanceEl.textContent = `${balanceAVAX.toFixed(4)} AVAX`;
        log(`Balance fetched: ${balanceAVAX.toFixed(4)} AVAX`, "success");

      } catch (err) {
        log(`Failed to get balance: ${err.message}`, "error");
      }
    });
  </script>
</body>
</html>
